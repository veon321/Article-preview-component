<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article preview component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="img-container">
        <img src="images/drawers.jpg" alt="Drawers" />
      </div>

      <div class="content">
        <div class="about">
          <h1>
            Shift the overall look and feel by adding these wonderful touches to
            furniture in your home
          </h1>
          <p>
            Ever been in a room and felt like something was missing? Perhaps it
            felt slightly bare and uninviting.
          </p>
        </div>

        <div class="profile" id="profilePasek">
          <div class="profile-info">
            <img src="images/avatar-michelle.jpg" alt="Michelle" />
            <div class="author-date">
              <span class="name">Michelle Appleton</span>
              <span class="date">28 Jun 2020</span>
            </div>
          </div>

          <div class="share-container" id="shareContainer">
            <button class="share-icon" type="button" id="shareButton">
              <img src="images/icon-share.svg" alt="Share" id="shareImg" />
            </button>

            <div class="share-tooltip">
              <span>Share</span>
              <a href="#"
                ><img src="images/icon-facebook.svg" alt="Facebook"
              /></a>
              <a href="#"
                ><img src="images/icon-twitter.svg" alt="Twitter"
              /></a>
              <a href="#"
                ><img src="images/icon-pinterest.svg" alt="Pinterest"
              /></a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
